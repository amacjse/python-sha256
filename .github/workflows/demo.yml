name: pyinstaller
on: workflow_dispatch

jobs:
 build-on-windows:
  runs-on: windows-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v6
   - name: install pyinstaller
     run: pip install pyinstaller
   - name: build exe
     run: pyinstaller sha256.py -F
   - name: upload exe file
     uses: actions/upload-artifact@v4
     with:
       name: sha256-windows-exe
       path: dist/sha256.exe

 build-on-linux:
  runs-on: ubuntu-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v6
   - name: install pyinstaller
     run: pip install pyinstaller
   - name: build binary
     run: pyinstaller sha256.py -F
   - name: upload binary file
     uses: actions/upload-artifact@v4
     with:
       name: sha256-linux
       path: dist/sha256

 build-on-mac:
  runs-on: macos-latest
  steps:
   - name: checkout code
     uses: actions/checkout@v6
   - name: Install pipx
     run: brew install pipx
   - name: Install PyInstaller via pipx
     run: pipx install pyinstaller
   - name: build binary
     run: pyinstaller sha256.py -F
   - name: upload binary file
     uses: actions/upload-artifact@v4
     with:
       name: sha256-mac
       path: dist/sha256
   
